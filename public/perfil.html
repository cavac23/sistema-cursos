<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de usuario</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="img/Logo2_ITQ.png">
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="menu" data-menu-dinamico>
    <a href="index.html" data-nav="inicio">Inicio</a>
    <a href="admin.html" data-nav="panel-admin" hidden>Dashboard</a>
    <a href="cursos.html" data-nav="cursos">Cursos</a>
    <a href="login.html" data-nav="login">Iniciar sesión</a>
    <a href="registro.html" data-nav="registro">Registrarse</a>
    <a href="estudiante.html" data-nav="panel-estudiante" hidden>Mi Panel</a>
    <a href="instructor.html" data-nav="panel-instructor" hidden>Panel Instructor</a>
    <a href="reportes.html" data-nav="reportes" hidden>Reportes</a>
    <a href="perfil.html" data-nav="perfil" hidden>Perfil</a>
    <button type="button" id="btnCerrar" class="boton-nav" data-nav="logout" hidden>Cerrar sesión</button>
  </nav>

  <main class="contenedor">
    <section class="tarjeta formulario">
      <h2>Perfil de usuario</h2>
      <form id="formPerfil">
        <label>Nombres</label>
        <input type="text" id="perfilNombres" required>

        <label>Apellidos</label>
        <input type="text" id="perfilApellidos" required>

        <label>Correo</label>
        <input type="email" id="perfilCorreo" required>

        <label>Rol</label>
        <input type="text" id="perfilRol" disabled>

        <label>Fecha de registro</label>
        <input type="text" id="perfilFecha" disabled>

        <label>Nueva contraseña (opcional)</label>
        <input type="password" id="perfilContrasena" minlength="8" placeholder="Dejar vacío si no desea cambiar">
        <p class="campo-ayuda">Mínimo 8 caracteres.</p>

        <button type="submit">Actualizar datos</button>
      </form>
      <p id="mensaje"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
