<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Estudiante ITQ</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="img/Logo2_ITQ.png">
</head>
<body data-pagina="panel-estudiante">
  <nav class="menu" data-menu-dinamico>
    <a href="index.html" data-nav="inicio">Inicio</a>
    <a href="admin.html" data-nav="panel-admin" hidden>Dashboard</a>
    <a href="cursos.html" data-nav="cursos">Cursos</a>
    <a href="login.html" data-nav="login">Iniciar sesión</a>
    <a href="registro.html" data-nav="registro">Registrarse</a>
    <a href="estudiante.html" data-nav="panel-estudiante" hidden>Mi Panel</a>
    <a href="instructor.html" data-nav="panel-instructor" hidden>Panel Instructor</a>
    <a href="reportes.html" data-nav="reportes" hidden>Reportes</a>
    <a href="perfil.html" data-nav="perfil" hidden>Perfil</a>
    <button type="button" id="btnCerrar" class="boton-nav" data-nav="logout" hidden>Cerrar sesión</button>
  </nav>

  <main class="contenedor-cursos modulo2-panel">
    <section class="encabezado-catalogo">
      <h1 class="titulo">Mi panel de cursos</h1>
      <p id="bienvenidaEstudiante">Cargando sesión...</p>
    </section>

    <p id="mensajeEstudiante" class="estado-modulo2" role="status"></p>

    <section class="panel-seccion">
      <h2>Mis cursos inscritos</h2>
      <p id="mensajeInscritos" class="estado-modulo2" role="status"></p>
      <section id="listaCursosInscritos" class="grid-cursos" aria-live="polite"></section>
    </section>

    <section class="panel-seccion">
      <h2>Cursos disponibles</h2>
      <p>Explora el catálogo y consulta el detalle de cada curso.</p>
      <p class="panel-contexto">
        <a class="boton" href="cursos.html">Ir al catálogo completo</a>
      </p>
      <p id="estadoCursosEstudiante" class="estado-modulo2" role="status"></p>
      <section id="listaCursosEstudiante" class="grid-cursos" aria-live="polite"></section>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="imagen-utils.js"></script>
</body>
</html>
