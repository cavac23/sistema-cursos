<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de cursos ITQ</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="img/Logo2_ITQ.png">
</head>
<body>
  <nav class="menu" data-menu-dinamico>
    <a href="index.html" data-nav="inicio">Inicio</a>
    <a href="admin.html" data-nav="panel-admin" hidden>Dashboard</a>
    <a href="cursos.html" data-nav="cursos">Cursos</a>
    <a href="login.html" data-nav="login">Iniciar sesión</a>
    <a href="registro.html" data-nav="registro">Registrarse</a>
    <a href="estudiante.html" data-nav="panel-estudiante" hidden>Mi Panel</a>
    <a href="instructor.html" data-nav="panel-instructor" hidden>Panel Instructor</a>
    <a href="reportes.html" data-nav="reportes" hidden>Reportes</a>
    <a href="perfil.html" data-nav="perfil" hidden>Perfil</a>
    <button type="button" id="btnCerrar" class="boton-nav" data-nav="logout" hidden>Cerrar sesión</button>
  </nav>

  <main class="contenedor-cursos modulo2-publico" data-pagina="catalogo-cursos">
    <section class="encabezado-catalogo">
      <h1 class="titulo">Catálogo de cursos ITQ</h1>
      <p>Explora los cursos disponibles por categoría, instructor o tema.</p>
    </section>

    <section class="filtros-cursos" aria-label="Filtros de cursos">
      <div class="campo-filtro">
        <label for="buscarCurso">Buscar curso</label>
        <input type="search" id="buscarCurso" placeholder="Ejemplo: Java, SQL, Web">
      </div>

      <div class="campo-filtro">
        <label for="categoriaCurso">Categoría</label>
        <select id="categoriaCurso">
          <option value="">Todas las categorías</option>
        </select>
      </div>

      <button type="button" class="boton" id="btnLimpiarFiltros">Limpiar filtros</button>
    </section>

    <p id="estadoCursos" class="estado-modulo2" role="status"></p>

    <section id="listaCursos" class="grid-cursos" aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
  <script src="imagen-utils.js"></script>
  <script src="modulo2-publico.js"></script>
</body>
</html>
